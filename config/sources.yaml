# Source registry. Each collector reads its config block by key.
# enabled=false sources are scaffolded but not yet implemented.

osm:
  enabled: true
  collector: dcdata.collectors.osm:OSMCollector
  overpass_url: https://overpass-api.de/api/interpreter
  cache: data/raw/osm/osm_datacenters.json
  license: ODbL
  attribution: "© OpenStreetMap contributors"

osm_lifecycle:
  enabled: true
  collector: dcdata.collectors.osm_lifecycle:OSMLifecycleCollector
  overpass_url: https://overpass-api.de/api/interpreter
  cache: data/raw/osm/osm_datacenters_lifecycle.json
  license: ODbL
  attribution: "© OpenStreetMap contributors"
  notes: "Planned/under-construction DCs via OSM construction:/proposed: tags."

peeringdb:
  enabled: true
  collector: dcdata.collectors.peeringdb:PeeringDBCollector
  api_url: https://www.peeringdb.com/api/fac?country=US
  cache: data/raw/peeringdb/fac_us.json
  license: "PeeringDB public API — verify redistribution terms"
  notes: "Colocation/interconnection facilities; ~1,357 US with coordinates."

wikidata:
  enabled: true
  collector: dcdata.collectors.wikidata:WikidataCollector
  sparql_url: https://query.wikidata.org/sparql
  cache: data/raw/wikidata/datacenters_us.json
  license: CC0
  notes: "US data centers (Q671224) with coordinates; low volume (~12)."

lbnl_queue:
  enabled: false
  collector: dcdata.collectors.lbnl_queue:LBNLQueueCollector
  notes: "GENERATION-only (not loads) — keep as a separate grid-context layer, NOT facility rows."

eia:
  enabled: false
  collector: dcdata.collectors.eia:EIACollector
  requires_key: EIA_API_KEY
  notes: "Free key from https://www.eia.gov/opendata/ — grid context, not a DC registry."

sec_edgar:
  enabled: false
  collector: dcdata.collectors.sec_edgar:SECCollector
  notes: "Operator portfolios (Equinix, Digital Realty) from 10-K filings. Public domain."
